services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_CONFIG_PATH: /app/config/settings.compose.yaml
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: digest
      POSTGRES_PASSWORD: digest
      POSTGRES_DB: digest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digest -d digest"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
