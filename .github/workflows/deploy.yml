name: Deploy

# Deploys the real app to the production server after CI passes on main.
# Also triggerable manually via workflow_dispatch.
#
# Required repository secrets:
#   DEPLOY_SSH_KEY        — private SSH key (corresponding public key in server's authorized_keys)
#   DEPLOY_HOST           — server hostname or IP
#   DEPLOY_USER           — SSH user on the server
#   DEPLOY_GHCR_USERNAME  — GitHub username with read:packages access to pull from GHCR
#   DEPLOY_GHCR_TOKEN     — GitHub PAT with read:packages scope (does not expire with workflow)
#
# Server prerequisites (set up once, outside this workflow):
#   /opt/security-digest/config/settings.yaml — runtime YAML config (not in repo)
#   Docker and Docker Compose installed on the server
#
# Rollback: to redeploy a previous version, run workflow_dispatch and set
#   the ref to the commit SHA, or manually run on the server:
#     export DEPLOY_IMAGE=ghcr.io/<owner>/digest:<old-sha>
#     docker compose -f compose.prod.yaml pull
#     docker compose -f compose.prod.yaml up -d --force-recreate

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy when CI passed (or when triggered manually)
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve deploy SHA
        id: meta
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT="${SHA:0:7}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository }}:$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"

      - name: Log in to GHCR (runner)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Generate deploy compose with exact image tag
        run: |
          # Write compose.prod.yaml with the exact SHA-tagged image so the server
          # always runs the specific image built from this commit — not just :latest.
          sed "s|ghcr.io/${{ github.repository }}:latest|${{ steps.meta.outputs.image }}|g" \
            compose.prod.yaml > /tmp/compose.deploy.yaml
          echo "Deploy image tag: $(grep 'image:' /tmp/compose.deploy.yaml)"

      - name: Copy deploy compose to server
        run: |
          scp -i ~/.ssh/deploy_key /tmp/compose.deploy.yaml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/security-digest/compose.prod.yaml

      - name: Authenticate server with GHCR
        # Uses a dedicated PAT (DEPLOY_GHCR_TOKEN) — not GITHUB_TOKEN, which is
        # ephemeral and workflow-scoped and has caused auth failures on the server.
        run: |
          echo "${{ secrets.DEPLOY_GHCR_TOKEN }}" | ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker login ghcr.io --username ${{ secrets.DEPLOY_GHCR_USERNAME }} --password-stdin"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            DEPLOY_IMAGE='${{ steps.meta.outputs.image }}' \
            'bash -s' <<'ENDSSH'
          set -e
          cd /opt/security-digest

          echo "=== Deploying image: $DEPLOY_IMAGE ==="

          # Ensure DB is up and healthy before running migrations
          docker compose -f compose.prod.yaml up -d db
          echo "Waiting for database to be healthy..."
          for i in $(seq 1 12); do
            docker compose -f compose.prod.yaml exec -T db \
              pg_isready -U digest -d digest && break
            echo "  attempt $i/12 — retrying in 5s"
            sleep 5
          done

          # Pull the exact SHA-tagged image — explicit, not relying on local cache
          docker compose -f compose.prod.yaml pull app

          # Apply any pending migrations
          docker compose -f compose.prod.yaml run --rm app alembic upgrade head

          # Recreate the app container unconditionally to guarantee the new image runs
          docker compose -f compose.prod.yaml up -d --force-recreate --remove-orphans app

          # Retire old smoke stack if still running (idempotent)
          docker stop security-digest-smoke 2>/dev/null && \
            docker rm security-digest-smoke 2>/dev/null || true

          echo "=== Deploy commands completed ==="
          ENDSSH

      - name: Smoke check
        run: |
          ssh -i ~/.ssh/deploy_key -T \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'bash -se' <<'ENDSSH'
          set -e
          echo "Waiting for app to respond..."
          for i in $(seq 1 12); do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo
              echo "Smoke check passed."
              exit 0
            fi
            echo "  attempt $i/12 — retrying in 5s"
            sleep 5
          done
          echo "Smoke check failed after 60s" >&2
          exit 1
          ENDSSH

      - name: Verify deployed version
        # Fail the workflow if the running app does not report the expected git SHA.
        # Retries for up to 60s — /version may not be ready the instant /health passes.
        run: |
          EXPECTED_SHA="${{ steps.meta.outputs.sha }}"
          echo "Expected SHA: $EXPECTED_SHA"

          ssh -i ~/.ssh/deploy_key -T \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            EXPECTED_SHA="$EXPECTED_SHA" \
            'bash -se' <<'ENDSSH'
          set -e
          echo "Waiting for /version to report expected SHA..."
          for i in $(seq 1 12); do
            RUNNING_SHA=$(curl -fsS http://127.0.0.1:8000/version 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['git_sha'])" 2>/dev/null || true)
            echo "  attempt $i/12 — running: ${RUNNING_SHA:-<no response>}  expected: $EXPECTED_SHA"
            if [ "$RUNNING_SHA" = "$EXPECTED_SHA" ]; then
              echo "Version verified OK."
              exit 0
            fi
            sleep 5
          done
          echo "VERSION MISMATCH after 60s — deploy did not switch to the new image" >&2
          exit 1
          ENDSSH
