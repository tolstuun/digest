name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: digest
          POSTGRES_PASSWORD: digest
          POSTGRES_DB: digest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U digest -d digest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # config/settings.example.yaml uses localhost:5432, which matches the
      # CI postgres service. No DATABASE_URL override — config is YAML-only.
      APP_CONFIG_PATH: config/settings.example.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List workflow files
        run: find .github/workflows -type f \( -name "*.yml" -o -name "*.yaml" \) | sort

      - name: Validate prod compose structure
        run: |
          python3 - <<'EOF'
          import yaml, sys

          with open("compose.prod.yaml") as f:
              doc = yaml.safe_load(f)

          services = doc.get("services", {})
          errors = []

          if "app" not in services:
              errors.append("compose.prod.yaml: missing 'app' service")
          if "db" not in services:
              errors.append("compose.prod.yaml: missing 'db' service")

          app = services.get("app", {})
          if not app.get("image"):
              errors.append("compose.prod.yaml: app.image must be set (not built from context)")
          if "build" in app:
              errors.append("compose.prod.yaml: app must not have a 'build' key — use pre-built image")
          if app.get("command", "").find("--reload") != -1:
              errors.append("compose.prod.yaml: app command must not use --reload")
          vols = [str(v) for v in app.get("volumes", [])]
          if any(v.startswith(".:/") or v.startswith(".\\") for v in vols):
              errors.append("compose.prod.yaml: app must not bind-mount the repo (no .:/app)")

          db = services.get("db", {})
          if "ports" in db:
              errors.append("compose.prod.yaml: db must not expose ports to the host in production")

          if not doc.get("volumes"):
              errors.append("compose.prod.yaml: missing named volumes section (postgres_data)")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)

          print("compose.prod.yaml structure OK")
          EOF
