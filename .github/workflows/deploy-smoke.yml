name: Deploy smoke

on:
  workflow_dispatch:

jobs:
  deploy-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Write compose file and start smoke container
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            mkdir -p /opt/security-digest
            cat > /opt/security-digest/compose.yaml <<'"'"'EOF'"'"'
            services:
              web:
                image: nginx:alpine
                container_name: security-digest-smoke
                restart: unless-stopped
                ports:
                  - "8080:80"
            EOF
            docker compose -f /opt/security-digest/compose.yaml up -d
            docker ps
          '

      - name: Smoke test
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "curl -fsS http://127.0.0.1:8080 >/dev/null && echo ok"
