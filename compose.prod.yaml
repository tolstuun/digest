# Production Docker Compose for Security Digest.
#
# This file is used as a TEMPLATE by the deploy workflow (.github/workflows/deploy.yml).
# On each deploy the workflow substitutes :latest with the exact commit SHA before
# copying this file to the server, so production always runs an immutable SHA-tagged
# image. The :latest tag here is for manual / local use only.
#
# Do not edit this file directly on the server — it is overwritten on every deploy.
#
# Prerequisites on the server (set up once, not managed by this file):
#   /opt/security-digest/config/settings.yaml — runtime config (YAML-only, not in repo)
#   Docker login to GHCR: provided automatically by deploy workflow via DEPLOY_GHCR_TOKEN secret
#
# The DB password below must match database.url in settings.yaml.
#
# Rollback to a previous version:
#   IMAGE=ghcr.io/tolstuun/digest:<previous-sha>
#   sed "s|ghcr.io/tolstuun/digest:latest|$IMAGE|g" compose.prod.yaml > /tmp/rollback.yaml
#   docker login ghcr.io -u <DEPLOY_GHCR_USERNAME> -p <DEPLOY_GHCR_TOKEN>
#   docker compose -f /tmp/rollback.yaml pull
#   docker compose -f /tmp/rollback.yaml up -d --force-recreate

services:
  app:
    image: ghcr.io/tolstuun/digest:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_CONFIG_PATH: /app/config/settings.yaml
    volumes:
      - /opt/security-digest/config/settings.yaml:/app/config/settings.yaml:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: digest
      POSTGRES_PASSWORD: digest
      POSTGRES_DB: digest
    # postgres is intentionally not exposed to the host; app connects via internal network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digest -d digest"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
